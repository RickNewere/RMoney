<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>RMoney</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1e3a8a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RMoney">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" href="favicon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    :root {
      --bg:#f2f4f7; --card:#ffffff; --field:#ffffff; --border:#cfd4dc;
      --text:#1a1a1a; --muted:#6b7280; --accent:#2563eb; --accentDim:#9db8f0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#0f1115; --card:#1a1d24; --field:#262a33; --border:#3a3f4b;
        --text:#f2f4f7; --muted:#9aa3b2; --accent:#3b82f6; --accentDim:#28466f;
      }
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { margin:0; background:var(--bg); }
    body {
      font-family:-apple-system, system-ui, Roboto, Arial, sans-serif;
      color:var(--text); padding:max(16px, env(safe-area-inset-top)) 14px 40px;
    }
    .brand { text-align:center; font-size:28px; font-weight:800; margin:12px 0 18px; }
    .card { max-width:480px; margin:0 auto; background:var(--card); border-radius:20px; padding:18px; }
    label { display:block; font-size:13px; font-weight:700; color:var(--muted); margin:16px 0 6px; }
    input, select {
      width:100%; font-size:17px; padding:13px 12px; border:1px solid var(--border);
      border-radius:12px; background:var(--field); color:var(--text); appearance:none; -webkit-appearance:none;
    }
    textarea {
      width:100%; font-size:17px; padding:13px 12px; border:1px solid var(--border);
      border-radius:12px; background:var(--field); color:var(--text); min-height:70px; resize:vertical;
    }
    .seg { display:flex; gap:8px; }
    .seg button {
      flex:1; padding:12px; border-radius:12px; border:1px solid var(--border);
      background:transparent; color:var(--text); font-size:16px; font-weight:700;
    }
    .seg button.on { background:var(--accent); color:#fff; border-color:var(--accent); }
    .check { display:flex; align-items:center; margin-top:20px; }
    .check .box {
      width:26px; height:26px; border-radius:7px; border:2px solid var(--border);
      margin-right:12px; display:flex; align-items:center; justify-content:center;
      color:#fff; font-weight:900; font-size:17px;
    }
    .check .box.on { background:var(--accent); border-color:var(--accent); }
    .check span { font-size:15px; font-weight:600; }
    #btn {
      width:100%; margin-top:22px; padding:16px; border:none; border-radius:14px;
      background:var(--accent); color:#fff; font-size:18px; font-weight:800;
    }
    #btn:disabled { background:var(--accentDim); }
    #msg { text-align:center; margin-top:16px; font-weight:700; min-height:22px; font-size:15px; }
    .ok { color:#16a34a; } .err { color:#dc2626; }
  </style>
</head>
<body>
  <div class="brand">💸 RMoney</div>

  <div class="card">
    <label>Persona</label>
    <div class="seg" id="persona">
      <button data-v="Riccardo" class="on">Riccardo</button>
      <button data-v="Roberta">Roberta</button>
    </div>

    <label>Conto</label>
    <div class="seg" id="conto">
      <button data-v="Euro" class="on">Euro</button>
      <button data-v="Franchi">Franchi</button>
    </div>

    <label>Data</label>
    <input type="date" id="data">

    <label id="labImporto">Importo (€)</label>
    <input type="text" id="spesa" inputmode="decimal" autocomplete="off" placeholder="0,00">

    <label>Categoria</label>
    <select id="categoria"><option>Caricamento…</option></select>

    <label>Nota</label>
    <textarea id="nota" placeholder="Facoltativa"></textarea>

    <div class="check" id="check">
      <div class="box" id="checkBox"></div>
      <span>Aggiungi «−» a destra della nota</span>
    </div>

    <button id="btn">Aggiungi spesa</button>
    <div id="msg"></div>
  </div>

  <script>
    var API = 'https://script.google.com/macros/s/AKfycbxLYg_8D6ltN1kdzXKj1gLdHhVex-MQc8c0bmO9LWcaPmS9q3fo9ZcJtbZD6jZtD0QNLQ/exec';
    var TABS = {
      Riccardo: { Euro: 113020932, Franchi: 650699013 },
      Roberta:  { Euro: 1888286288, Franchi: 1063479927 }
    };
    var persona = 'Riccardo', conto = 'Euro', segno = false;

    document.getElementById('data').value = new Date().toISOString().slice(0, 10);
    function gid() { return TABS[persona][conto]; }

    function initSeg(id, onPick) {
      var box = document.getElementById(id);
      box.addEventListener('click', function (ev) {
        var b = ev.target.closest('button'); if (!b) return;
        [].forEach.call(box.children, function (c) { c.classList.remove('on'); });
        b.classList.add('on');
        onPick(b.getAttribute('data-v'));
      });
    }
    initSeg('persona', function (v) { persona = v; caricaCategorie(); });
    initSeg('conto', function (v) {
      conto = v;
      document.getElementById('labImporto').textContent = 'Importo (' + (v === 'Euro' ? '€' : 'CHF') + ')';
      caricaCategorie();
    });

    document.getElementById('check').addEventListener('click', function () {
      segno = !segno;
      var b = document.getElementById('checkBox');
      b.classList.toggle('on', segno);
      b.textContent = segno ? '✓' : '';
    });

    function caricaCategorie() {
      var sel = document.getElementById('categoria');
      sel.innerHTML = '<option>Caricamento…</option>';
      fetch(API + '?action=categorie&gid=' + gid())
        .then(function (r) { return r.json(); })
        .then(function (j) {
          var cats = (j && j.categorie) || [];
          sel.innerHTML = '';
          if (!cats.length) { sel.innerHTML = '<option value="">(nessuna categoria)</option>'; return; }
          cats.forEach(function (c) {
            var o = document.createElement('option');
            o.value = c; o.textContent = c; sel.appendChild(o);
          });
        })
        .catch(function () { sel.innerHTML = '<option value="">(errore categorie)</option>'; });
    }
    caricaCategorie();

    document.getElementById('btn').addEventListener('click', function () {
      var msg = document.getElementById('msg');
      var btn = document.getElementById('btn');
      var spesa = document.getElementById('spesa').value.trim();
      if (!spesa) { msg.className = 'err'; msg.textContent = 'Inserisci un importo.'; return; }
      if (isNaN(parseFloat(spesa.replace(',', '.')))) {
        msg.className = 'err'; msg.textContent = 'Importo non valido.'; return;
      }

      var dati = {
        gid: gid(),
        data: document.getElementById('data').value,
        spesa: spesa,
        categoria: document.getElementById('categoria').value,
        nota: document.getElementById('nota').value,
        segno: segno
      };

      btn.disabled = true; msg.className = ''; msg.textContent = 'Salvataggio…';
      fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(dati)
      })
        .then(function (r) { return r.json(); })
        .then(function (j) {
          if (j && j.ok) {
            msg.className = 'ok'; msg.textContent = '✓ Spesa aggiunta al foglio!';
            document.getElementById('spesa').value = '';
            document.getElementById('nota').value = '';
            segno = false;
            document.getElementById('checkBox').classList.remove('on');
            document.getElementById('checkBox').textContent = '';
          } else {
            msg.className = 'err'; msg.textContent = 'Errore: ' + ((j && j.error) || 'sconosciuto');
          }
          btn.disabled = false;
        })
        .catch(function (e) {
          msg.className = 'err'; msg.textContent = 'Errore di rete: ' + e.message;
          btn.disabled = false;
        });
    });
  </script>
</body>
</html>
