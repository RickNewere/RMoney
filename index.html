<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <title>RMoney</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1e3a8a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RMoney">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" href="favicon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <style>
    :root {
      --bg:#f2f4f7; --card:#ffffff; --field:#ffffff; --border:#cfd4dc;
      --text:#1a1a1a; --muted:#6b7280; --accent:#2563eb; --accentDim:#9db8f0;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:#0f1115; --card:#1a1d24; --field:#262a33; --border:#3a3f4b;
        --text:#f2f4f7; --muted:#9aa3b2; --accent:#3b82f6; --accentDim:#28466f;
      }
    }
    * { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html,body { margin:0; background:var(--bg); }
    body {
      font-family:-apple-system, system-ui, Roboto, Arial, sans-serif;
      color:var(--text); padding:max(16px, env(safe-area-inset-top)) 14px 40px;
    }
    .brand { text-align:center; font-size:28px; font-weight:800; margin:12px 0 18px; }
    .card { max-width:480px; margin:0 auto; background:var(--card); border-radius:20px; padding:18px; }
    label { display:block; font-size:13px; font-weight:700; color:var(--muted); margin:16px 0 6px; }
    input, select {
      width:100%; font-size:17px; padding:13px 12px; border:1px solid var(--border);
      border-radius:12px; background:var(--field); color:var(--text); appearance:none; -webkit-appearance:none;
    }
    textarea {
      width:100%; font-size:17px; padding:13px 12px; border:1px solid var(--border);
      border-radius:12px; background:var(--field); color:var(--text); min-height:70px; resize:vertical;
    }
    .seg { display:flex; gap:8px; }
    .seg button {
      flex:1; padding:12px; border-radius:12px; border:1px solid var(--border);
      background:transparent; color:var(--text); font-size:16px; font-weight:700;
    }
    .seg button.on { background:var(--accent); color:#fff; border-color:var(--accent); }
    .check { display:flex; align-items:center; margin-top:20px; }
    .check .box {
      width:26px; height:26px; border-radius:7px; border:2px solid var(--border);
      margin-right:12px; display:flex; align-items:center; justify-content:center;
      color:#fff; font-weight:900; font-size:17px;
    }
    .check .box.on { background:var(--accent); border-color:var(--accent); }
    .check span { font-size:15px; font-weight:600; }
    #btn {
      width:100%; margin-top:22px; padding:16px; border:none; border-radius:14px;
      background:var(--accent); color:#fff; font-size:18px; font-weight:800;
    }
    #btn:disabled { background:var(--accentDim); }
    #msg { text-align:center; margin-top:16px; font-weight:700; min-height:22px; font-size:15px; }
    .ok { color:#16a34a; } .err { color:#dc2626; }
    .debt { padding:14px 18px; margin-bottom:14px; }
    .debtTitle { font-size:12px; font-weight:800; color:var(--muted); margin-bottom:10px; text-transform:uppercase; letter-spacing:.5px; }
    .debtRow { display:flex; justify-content:space-between; align-items:baseline; gap:12px; padding:6px 0; }
    .debtRow.net { border-top:1px solid var(--border); margin-top:4px; padding-top:12px; }
    .debtLbl { font-size:14px; color:var(--text); }
    .debtVal { font-size:17px; font-weight:800; color:var(--accent); white-space:nowrap; }
    .debtVal.zero { color:var(--muted); font-weight:600; font-size:14px; }
    .saldaBtn { width:100%; margin-top:14px; padding:11px; border-radius:12px; border:1px solid var(--border); background:transparent; color:var(--muted); font-size:14px; font-weight:700; }
    .saldaBtn:disabled { opacity:.5; }
    .saldaMsg { text-align:center; margin-top:8px; font-size:13px; font-weight:600; min-height:16px; }
    .topToggle { max-width:480px; margin:0 auto 14px; }
    .periodLbl { text-align:center; font-size:13px; color:var(--muted); margin-top:12px; }
    .ovGrid { display:flex; gap:10px; }
    .ovCell { flex:1; text-align:center; padding:10px 6px; border:1px solid var(--border); border-radius:12px; }
    .ovLbl { font-size:11px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; }
    .ovVal { font-size:16px; font-weight:800; margin-top:4px; white-space:nowrap; }
    .ovVal.pos { color:#16a34a; } .ovVal.neg { color:#dc2626; }
    .secTitle { font-size:12px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:12px; }
    .card + .card { margin-top:14px; }
    canvas { max-width:100%; }
    .donutRow { display:flex; gap:6px; margin-top:16px; }
    .donutCell { flex:1; min-width:0; text-align:center; }
    .donutTit { font-size:12px; font-weight:700; color:var(--muted); margin-bottom:6px; }
    .donutLegend { text-align:center; margin-top:12px; font-size:12px; color:var(--muted); }
    .donutLegend .dl { display:inline-block; width:10px; height:10px; border-radius:2px; margin:0 4px 0 10px; vertical-align:middle; }
    .donutLegend .dl.s { background:#ec4899; } .donutLegend .dl.e { background:#16a34a; }
    #riepMsg { text-align:center; margin-top:14px; font-weight:700; min-height:22px; font-size:15px; }
  </style>
</head>
<body>
  <div class="brand">💸 RMoney</div>

  <div class="seg topToggle" id="topToggle">
    <button data-v="inserisci" class="on">Inserisci</button>
    <button data-v="riepilogo">Riepilogo</button>
  </div>

  <div id="viewInserisci">
  <div class="card debt" id="debt">
    <div class="debtTitle">Debito condiviso</div>
    <div class="debtRow">
      <span class="debtLbl" id="debtFoglioLbl">Dal foglio</span>
      <span class="debtVal" id="debtFoglioVal">…</span>
    </div>
    <div class="debtRow net">
      <span class="debtLbl" id="debtNetLbl">Saldo netto</span>
      <span class="debtVal" id="debtNetVal">…</span>
    </div>
    <button id="saldaBtn" class="saldaBtn">Segna come saldato</button>
    <div id="saldaMsg" class="saldaMsg"></div>
  </div>

  <div class="card">
    <label>Persona</label>
    <div class="seg" id="persona">
      <button data-v="Riccardo" class="on">Riccardo</button>
      <button data-v="Roberta">Roberta</button>
    </div>

    <label>Conto</label>
    <div class="seg" id="conto">
      <button data-v="Euro" class="on">Euro</button>
      <button data-v="Franchi">Franchi</button>
    </div>

    <label>Data</label>
    <input type="date" id="data">

    <label id="labImporto">Importo (€)</label>
    <input type="text" id="spesa" inputmode="decimal" autocomplete="off" placeholder="0,00">

    <label>Categoria</label>
    <select id="categoria"><option>Caricamento…</option></select>

    <label>Nota</label>
    <textarea id="nota" placeholder="Facoltativa"></textarea>

    <div class="check" id="check">
      <div class="box" id="checkBox"></div>
      <span>Spesa condivisa (dividi a metà)</span>
    </div>

    <button id="btn">Aggiungi spesa</button>
    <div id="msg"></div>
  </div>
  </div><!-- /viewInserisci -->

  <div id="viewRiepilogo" style="display:none">
    <div class="card">
      <label>Periodo</label>
      <div class="seg" id="riepPeriodo">
        <button data-v="Annuale" class="on">Annuale</button>
        <button data-v="Mensile">Mensile</button>
      </div>
      <label>Valuta</label>
      <div class="seg" id="riepValuta">
        <button data-v="Euro" class="on">Euro</button>
        <button data-v="Franchi">Franchi</button>
      </div>

      <div id="wrapAnno">
        <label>Anno</label>
        <select id="riepAnno"></select>
      </div>
      <div id="wrapMese" style="display:none">
        <label>Mese</label>
        <input type="month" id="riepMese">
      </div>

      <div class="periodLbl" id="riepPeriodoLbl"></div>
    </div>

    <div class="card">
      <div class="ovGrid">
        <div class="ovCell"><div class="ovLbl">Entrate</div><div class="ovVal" id="ovEntrate">…</div></div>
        <div class="ovCell"><div class="ovLbl">Uscite</div><div class="ovVal" id="ovUscite">…</div></div>
        <div class="ovCell"><div class="ovLbl">Risparmio</div><div class="ovVal" id="ovRisparmio">…</div></div>
      </div>
      <div class="donutRow">
        <div class="donutCell"><div class="donutTit">Roberta</div><canvas id="chDonutRob"></canvas></div>
        <div class="donutCell"><div class="donutTit">Riccardo</div><canvas id="chDonutRicc"></canvas></div>
        <div class="donutCell"><div class="donutTit">Totale</div><canvas id="chDonutTot"></canvas></div>
      </div>
      <div class="donutLegend"><span class="dl s"></span>Spese <span class="dl e"></span>Entrate</div>
    </div>

    <div class="card">
      <div class="secTitle">Entrate · Risparmio · Spese</div>
      <canvas id="chBar" height="200"></canvas>
    </div>

    <div class="card" id="cardAndamento">
      <div class="secTitle">Andamento risparmio mensile</div>
      <canvas id="chLine" height="230"></canvas>
    </div>

    <div class="card">
      <div class="secTitle">Spese per categoria</div>
      <canvas id="chCat" height="420"></canvas>
    </div>

    <div id="riepMsg"></div>
  </div><!-- /viewRiepilogo -->

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script>
    var API = 'https://script.google.com/macros/s/AKfycbwMZ4nRTwIG3XdGAgBsF2cnySkTBgGvVSASDGnfj28eUxfZfHi-dOjIp2AzPQMAgO1D/exec';
    var TABS = {
      Riccardo: { Euro: 113020932, Franchi: 650699013 },
      Roberta:  { Euro: 1888286288, Franchi: 1063479927 }
    };
    var persona = 'Riccardo', conto = 'Euro', segno = false;

    document.getElementById('data').value = new Date().toISOString().slice(0, 10);
    function gid() { return TABS[persona][conto]; }

    function initSeg(id, onPick) {
      var box = document.getElementById(id);
      box.addEventListener('click', function (ev) {
        var b = ev.target.closest('button'); if (!b) return;
        [].forEach.call(box.children, function (c) { c.classList.remove('on'); });
        b.classList.add('on');
        onPick(b.getAttribute('data-v'));
      });
    }
    initSeg('persona', function (v) { persona = v; caricaCategorie(); caricaDebito(); });
    initSeg('conto', function (v) {
      conto = v;
      document.getElementById('labImporto').textContent = 'Importo (' + (v === 'Euro' ? '€' : 'CHF') + ')';
      caricaCategorie();
      caricaDebito();
    });

    document.getElementById('check').addEventListener('click', function () {
      segno = !segno;
      var b = document.getElementById('checkBox');
      b.classList.toggle('on', segno);
      b.textContent = segno ? '✓' : '';
    });

    function caricaCategorie() {
      var sel = document.getElementById('categoria');
      sel.innerHTML = '<option>Caricamento…</option>';
      fetch(API + '?action=categorie&gid=' + gid())
        .then(function (r) { return r.json(); })
        .then(function (j) {
          var cats = (j && j.categorie) || [];
          sel.innerHTML = '';
          if (!cats.length) { sel.innerHTML = '<option value="">(nessuna categoria)</option>'; return; }
          cats.forEach(function (c) {
            var o = document.createElement('option');
            o.value = c; o.textContent = c; sel.appendChild(o);
          });
        })
        .catch(function () { sel.innerHTML = '<option value="">(errore categorie)</option>'; });
    }
    caricaCategorie();

    // ---- Debito condiviso (righe col trattino) ----
    function altraPersona() { return persona === 'Riccardo' ? 'Roberta' : 'Riccardo'; }
    function partnerGid() { return TABS[altraPersona()][conto]; }
    function simbolo() { return conto === 'Euro' ? '€' : 'CHF'; }
    function fmtImporto(n) {
      return simbolo() + ' ' + (Math.round(n * 100) / 100).toFixed(2).replace('.', ',');
    }

    function caricaDebito() {
      var foglioLbl = document.getElementById('debtFoglioLbl');
      var foglioVal = document.getElementById('debtFoglioVal');
      var netLbl = document.getElementById('debtNetLbl');
      var netVal = document.getElementById('debtNetVal');
      foglioLbl.textContent = altraPersona() + ' deve a ' + persona;
      netLbl.textContent = 'Saldo netto ' + conto;
      foglioVal.textContent = '…'; foglioVal.className = 'debtVal';
      netVal.textContent = '…'; netVal.className = 'debtVal';
      document.getElementById('saldaBtn').textContent = 'Saldato · azzera split ' + persona + ' ' + conto;
      document.getElementById('saldaMsg').textContent = '';

      fetch(API + '?action=debito&gid=' + gid() + '&gidPartner=' + partnerGid())
        .then(function (r) { return r.json(); })
        .then(function (j) {
          var d = j && j.debito;
          if (!d || !d.mio) { foglioVal.textContent = '—'; netVal.textContent = '—'; return; }

          // Meta condivisa di questo foglio (quanto l'altra persona deve).
          if (d.mio.meta > 0.005) {
            foglioVal.textContent = fmtImporto(d.mio.meta);
            foglioVal.className = 'debtVal';
          } else {
            foglioVal.textContent = 'nessuna spesa condivisa';
            foglioVal.className = 'debtVal zero';
          }

          // Saldo netto per valuta: meta(mio) - meta(partner).
          var netto = d.netto || 0;
          var abs = Math.abs(netto);
          if (abs < 0.005) {
            netLbl.textContent = 'Saldo netto ' + conto;
            netVal.textContent = 'in pari';
            netVal.className = 'debtVal zero';
          } else {
            var chi = netto > 0 ? altraPersona() : persona;
            var aChi = netto > 0 ? persona : altraPersona();
            netLbl.textContent = chi + ' deve a ' + aChi + ' (' + conto + ')';
            netVal.textContent = fmtImporto(abs);
            netVal.className = 'debtVal';
          }
        })
        .catch(function () {
          foglioVal.textContent = '(errore)'; foglioVal.className = 'debtVal zero';
          netVal.textContent = '';
        });
    }
    caricaDebito();

    // Bottone "saldato": azzera le spunte split del SOLO foglio selezionato.
    document.getElementById('saldaBtn').addEventListener('click', function () {
      var m = document.getElementById('saldaMsg');
      var ok = confirm('Azzerare tutte le spunte "split" di ' + persona + ' ' + conto + '?\n\n'
        + 'Le spese restano nel foglio: vengono solo tolte le spunte, quindi non saranno più conteggiate come condivise.');
      if (!ok) return;
      var btn = this;
      btn.disabled = true; m.className = 'saldaMsg'; m.textContent = 'Azzeramento…';
      fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ op: 'salda', gid: gid() })
      })
        .then(function (r) { return r.json(); })
        .then(function (j) {
          if (j && j.ok) {
            caricaDebito(); // ricalcola prima (azzera saldaMsg internamente)
            m.className = 'saldaMsg ok'; m.textContent = '✓ Azzerate ' + (j.azzerate || 0) + ' spunte';
          } else {
            m.className = 'saldaMsg err'; m.textContent = 'Errore: ' + ((j && j.error) || 'sconosciuto');
          }
          btn.disabled = false;
        })
        .catch(function (e) {
          m.className = 'saldaMsg err'; m.textContent = 'Errore di rete: ' + e.message;
          btn.disabled = false;
        });
    });

    document.getElementById('btn').addEventListener('click', function () {
      var msg = document.getElementById('msg');
      var btn = document.getElementById('btn');
      var spesa = document.getElementById('spesa').value.trim();
      if (!spesa) { msg.className = 'err'; msg.textContent = 'Inserisci un importo.'; return; }
      if (isNaN(parseFloat(spesa.replace(',', '.')))) {
        msg.className = 'err'; msg.textContent = 'Importo non valido.'; return;
      }

      var dati = {
        gid: gid(),
        data: document.getElementById('data').value,
        spesa: spesa,
        categoria: document.getElementById('categoria').value,
        nota: document.getElementById('nota').value,
        segno: segno
      };

      btn.disabled = true; msg.className = ''; msg.textContent = 'Salvataggio…';
      fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(dati)
      })
        .then(function (r) { return r.json(); })
        .then(function (j) {
          if (j && j.ok) {
            msg.className = 'ok'; msg.textContent = '✓ Spesa aggiunta al foglio!';
            document.getElementById('spesa').value = '';
            document.getElementById('nota').value = '';
            segno = false;
            document.getElementById('checkBox').classList.remove('on');
            document.getElementById('checkBox').textContent = '';
            if (dati.segno) caricaDebito(); // spesa condivisa: aggiorna il totale
          } else {
            msg.className = 'err'; msg.textContent = 'Errore: ' + ((j && j.error) || 'sconosciuto');
          }
          btn.disabled = false;
        })
        .catch(function (e) {
          msg.className = 'err'; msg.textContent = 'Errore di rete: ' + e.message;
          btn.disabled = false;
        });
    });

    // ==================== Riepilogo ====================
    var riepP = 'Annuale', riepC = 'Euro';
    var charts = {}; // istanze Chart.js, per distruggerle prima di ricrearle

    // Popola il selettore anno (dal 2024 all'anno corrente) e il mese corrente.
    (function initPeriodo() {
      var annoSel = document.getElementById('riepAnno');
      var ora = new Date();
      for (var y = ora.getFullYear(); y >= 2024; y--) {
        var o = document.createElement('option');
        o.value = y; o.textContent = y; annoSel.appendChild(o);
      }
      annoSel.value = ora.getFullYear();
      document.getElementById('riepMese').value =
        ora.getFullYear() + '-' + String(ora.getMonth() + 1).padStart(2, '0');
    })();

    function riepSimbolo() { return riepC === 'Euro' ? '€' : 'CHF'; }
    function riepFmt(n) {
      var s = Math.abs(n).toLocaleString('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return (n < 0 ? '-' : '') + riepSimbolo() + ' ' + s;
    }
    function chartTextColor() {
      return getComputedStyle(document.body).getPropertyValue('--text').trim() || '#333';
    }
    function gridColor() {
      return getComputedStyle(document.body).getPropertyValue('--border').trim() || '#ccc';
    }
    // Palette per categorie/serie.
    var PAL = ['#2563eb', '#ec4899', '#16a34a', '#f59e0b', '#8b5cf6', '#06b6d4',
               '#ef4444', '#10b981', '#f97316', '#6366f1'];

    function destroyChart(k) { if (charts[k]) { charts[k].destroy(); charts[k] = null; } }

    document.getElementById('topToggle').addEventListener('click', function (ev) {
      var b = ev.target.closest('button'); if (!b) return;
      [].forEach.call(this.children, function (c) { c.classList.remove('on'); });
      b.classList.add('on');
      var v = b.getAttribute('data-v');
      document.getElementById('viewInserisci').style.display = v === 'inserisci' ? '' : 'none';
      document.getElementById('viewRiepilogo').style.display = v === 'riepilogo' ? '' : 'none';
      if (v === 'riepilogo') caricaRiepilogo();
    });

    initSeg('riepPeriodo', function (v) {
      riepP = v;
      var an = v === 'Annuale';
      document.getElementById('wrapAnno').style.display = an ? '' : 'none';
      document.getElementById('wrapMese').style.display = an ? 'none' : '';
      caricaRiepilogo();
    });
    initSeg('riepValuta', function (v) { riepC = v; caricaRiepilogo(); });
    document.getElementById('riepAnno').addEventListener('change', caricaRiepilogo);
    document.getElementById('riepMese').addEventListener('change', caricaRiepilogo);

    function caricaRiepilogo() {
      var m = document.getElementById('riepMsg');
      m.className = ''; m.textContent = 'Caricamento…';
      var url = API + '?action=riep&conto=' + riepC + '&tipo=' + (riepP === 'Annuale' ? 'annuale' : 'mensile');
      if (riepP === 'Annuale') {
        url += '&anno=' + document.getElementById('riepAnno').value;
      } else {
        var mm = (document.getElementById('riepMese').value || '').split('-');
        url += '&anno=' + (mm[0] || '') + '&mese=' + (parseInt(mm[1], 10) || '');
      }
      fetch(url)
        .then(function (r) { return r.json(); })
        .then(function (j) {
          var d = j && j.riepilogo;
          if (!d) { m.className = 'err'; m.textContent = 'Nessun dato.'; return; }
          m.textContent = '';
          renderRiepilogo(d);
        })
        .catch(function (e) { m.className = 'err'; m.textContent = 'Errore di rete: ' + e.message; });
    }

    function renderRiepilogo(d) {
      var per = d.periodo || {};
      document.getElementById('riepPeriodoLbl').textContent =
        (per.inizio ? per.inizio : '') + (per.fine ? ' → ' + per.fine : '');

      var ov = d.overview || { entrate: 0, uscite: 0, totale: 0 };
      document.getElementById('ovEntrate').textContent = riepFmt(ov.entrate);
      document.getElementById('ovUscite').textContent = riepFmt(ov.uscite);
      var risp = document.getElementById('ovRisparmio');
      risp.textContent = riepFmt(ov.totale);
      risp.className = 'ovVal ' + (ov.totale < 0 ? 'neg' : 'pos');

      var txt = chartTextColor(), grid = gridColor();
      Chart.defaults.color = txt;
      Chart.defaults.font.family = getComputedStyle(document.body).fontFamily;

      // --- Donut per persona: spese vs entrate (Roberta, Riccardo, Totale) ---
      var e = d.entrate || {}, s = d.risparmio || {};
      function donut(id, spese, entrate) {
        destroyChart(id);
        charts[id] = new Chart(document.getElementById(id), {
          type: 'doughnut',
          data: { labels: ['Spese', 'Entrate'], datasets: [{ data: [spese, entrate], backgroundColor: ['#ec4899', '#16a34a'], borderWidth: 0 }] },
          options: {
            plugins: {
              legend: { display: false },
              tooltip: { callbacks: { label: function (c) { return c.label + ': ' + riepFmt(c.raw); } } }
            },
            cutout: '55%'
          }
        });
      }
      donut('chDonutRob', (e.roberta || 0) - (s.roberta || 0), e.roberta || 0);
      donut('chDonutRicc', (e.riccardo || 0) - (s.riccardo || 0), e.riccardo || 0);
      donut('chDonutTot', ov.uscite, ov.entrate);

      // --- Barre: entrate / risparmio / spese per persona ---
      var persone = ['Roberta', 'Riccardo', 'Totale'];
      var kEntr = [e.roberta || 0, e.riccardo || 0, e.totale || 0];
      var kRisp = [s.roberta || 0, s.riccardo || 0, s.totale || 0];
      var kSpese = kEntr.map(function (x, i) { return x - kRisp[i]; });
      destroyChart('bar');
      charts.bar = new Chart(document.getElementById('chBar'), {
        type: 'bar',
        data: {
          labels: persone,
          datasets: [
            { label: 'Entrate', data: kEntr, backgroundColor: '#16a34a' },
            { label: 'Spese', data: kSpese, backgroundColor: '#ec4899' },
            { label: 'Risparmio', data: kRisp, backgroundColor: '#2563eb' }
          ]
        },
        options: {
          plugins: {
            legend: { position: 'bottom' },
            tooltip: { callbacks: { label: function (c) { return c.dataset.label + ': ' + riepFmt(c.raw); } } }
          },
          scales: {
            x: { grid: { display: false } },
            y: { grid: { color: grid }, ticks: { callback: function (v) { return riepSimbolo() + ' ' + v; } } }
          }
        }
      });

      // --- Linea: andamento risparmio mensile (solo annuale) ---
      var cardAnd = document.getElementById('cardAndamento');
      if (d.andamento && d.andamento.mesi && d.andamento.mesi.length) {
        cardAnd.style.display = '';
        var a = d.andamento;
        destroyChart('line');
        charts.line = new Chart(document.getElementById('chLine'), {
          type: 'line',
          data: {
            labels: a.mesi,
            datasets: [
              { label: 'Roberta', data: a.roberta, borderColor: '#8b5cf6', backgroundColor: '#8b5cf6', tension: .3, pointRadius: 2 },
              { label: 'Riccardo', data: a.riccardo, borderColor: '#16a34a', backgroundColor: '#16a34a', tension: .3, pointRadius: 2 },
              { label: 'Totale', data: a.totale, borderColor: '#ec4899', backgroundColor: '#ec4899', tension: .3, pointRadius: 2 }
            ]
          },
          options: {
            plugins: {
              legend: { position: 'bottom' },
              tooltip: { callbacks: { label: function (c) { return c.dataset.label + ': ' + riepFmt(c.raw); } } }
            },
            scales: {
              x: { grid: { display: false }, ticks: { maxRotation: 90, minRotation: 45, font: { size: 9 } } },
              y: { grid: { color: grid }, ticks: { callback: function (v) { return riepSimbolo() + ' ' + v; } } }
            }
          }
        });
      } else {
        cardAnd.style.display = 'none';
        destroyChart('line');
      }

      // --- Barre orizzontali: spese per categoria, Riccardo vs Roberta ---
      var spR = (d.spese && d.spese.roberta) || [];
      var spI = (d.spese && d.spese.riccardo) || [];
      var cats = [];
      spI.forEach(function (x) { if (cats.indexOf(x.categoria) < 0) cats.push(x.categoria); });
      spR.forEach(function (x) { if (cats.indexOf(x.categoria) < 0) cats.push(x.categoria); });
      function valFor(list, cat) {
        for (var i = 0; i < list.length; i++) if (list[i].categoria === cat) return list[i].importo;
        return 0;
      }
      var dRicc = cats.map(function (c) { return valFor(spI, c); });
      var dRob = cats.map(function (c) { return valFor(spR, c); });
      destroyChart('cat');
      charts.cat = new Chart(document.getElementById('chCat'), {
        type: 'bar',
        data: {
          labels: cats,
          datasets: [
            { label: 'Riccardo', data: dRicc, backgroundColor: '#2563eb' },
            { label: 'Roberta', data: dRob, backgroundColor: '#ec4899' }
          ]
        },
        options: {
          indexAxis: 'y',
          plugins: {
            legend: { position: 'bottom' },
            tooltip: { callbacks: { label: function (c) { return c.dataset.label + ': ' + riepFmt(c.raw); } } }
          },
          scales: {
            x: { grid: { color: grid }, ticks: { callback: function (v) { return riepSimbolo() + ' ' + v; } } },
            y: { grid: { display: false }, ticks: { font: { size: 11 } } }
          }
        }
      });
    }
  </script>
</body>
</html>
